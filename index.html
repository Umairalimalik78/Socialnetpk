<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialNet — Connect, Share, Discover</title>
  <meta name="description" content="SocialNet is a modern social networking platform to connect with friends, share moments, and discover what's happening in your world." />
  <meta property="og:title" content="SocialNet — Connect, Share, Discover" />
  <meta property="og:description" content="A modern social networking platform." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1d9bf0" />
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="/src/styles/index.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/animations.css" />
</head>
<body>
  <div id="app">
    <div id="splash" class="splash-screen">
      <div class="splash-logo">
        <div class="splash-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="20" fill="url(#grad)"/>
            <path d="M12 14C12 14 16 20 20 20C24 20 28 14 28 14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="14" cy="26" r="3" fill="white" opacity="0.8"/>
            <circle cx="20" cy="28" r="3" fill="white"/>
            <circle cx="26" cy="26" r="3" fill="white" opacity="0.8"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#1d9bf0"/>
                <stop offset="100%" stop-color="#7856ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span>SocialNet</span>
      </div>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
  </div>
  <div id="toast-container"></div>
  <div id="modal-overlay"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
